<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Warning Text</title>
  <style>
    :root { --bg:#0f0f10; --surface:#18181b; --text:#fafafa; --muted:#71717a; --accent:#e8ff47; --border:#27272a; --danger:#f87171; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { padding: 0.75rem 1.1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .main { padding: 1rem; max-width: 980px; margin: 0 auto; }
    h1 { font-size: 1.25rem; margin: 0 0 0.25rem; }
    .lede { color: var(--muted); font-size: 0.9rem; margin: 0 0 1.25rem; line-height: 1.45; }
    .drop {
      margin-top: 1rem;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 1.2rem 0.9rem;
      text-align: center;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .cards {
      margin-top: 0.9rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.65rem;
      background: var(--surface);
    }
    .card h2 {
      margin: 0 0 0.6rem;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 600;
    }
    .video-box {
      width: 100%;
      height: 330px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #0b0b0d;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      padding: 0.5rem;
    }
    .video-box video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .drop:hover, .drop.drag { border-color: var(--accent); color: var(--text); }
    .drop strong { color: var(--text); }
    .file-name { margin-top: 0.75rem; font-size: 0.85rem; color: var(--accent); word-break: break-all; }
    .placement {
      margin-top: 0.75rem; padding: 0.6rem 0.9rem; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface);
    }
    .placement legend { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); padding: 0 0.25rem; }
    .placement .opts { display: flex; gap: 1.25rem; margin-top: 0.5rem; flex-wrap: wrap; }
    .placement label { display: flex; align-items: center; gap: 0.4rem; cursor: pointer; font-size: 0.95rem; }
    .placement input { accent-color: var(--accent); }
    .row { display: flex; gap: 0.65rem; flex-wrap: wrap; margin-top: 0.85rem; align-items: center; }
    button {
      font: inherit; cursor: pointer; border: none; border-radius: 8px; padding: 0.55rem 0.95rem;
      background: var(--accent); color: #0f0f10; font-weight: 600;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .status { font-size: 0.82rem; color: var(--muted); min-height: 1.1rem; margin-top: 0.55rem; }
    .status.err { color: var(--danger); }
    .status.ok { color: var(--accent); }
    .download {
      margin-top: 0.55rem;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border-radius: 8px;
      padding: 0.5rem 0.85rem;
      border: 1px solid var(--border);
      background: #202025;
      color: var(--text);
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.12s ease, border-color 0.12s ease;
    }
    .download:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }
    .download svg { width: 14px; height: 14px; }
    input[type="file"] { display: none; }
    @media (max-width: 900px) {
      .cards { grid-template-columns: 1fr; }
      .video-box { height: 300px; }
    }
  </style>
</head>
<body>
  <header>
    <span>Warning Text</span>
  </header>
  <main class="main">
    <h1>Burn overlay on video</h1>

    <section class="cards">
      <article class="card">
        <h2>Before</h2>
        <div class="video-box" id="beforeBox">
          <span id="beforePlaceholder">Select a video to preview</span>
          <video id="beforeVideo" controls hidden></video>
        </div>
      </article>
      <article class="card">
        <h2>After</h2>
        <div class="video-box" id="afterBox">
          <span id="afterPlaceholder">Process video to preview result</span>
          <video id="afterVideo" controls hidden></video>
        </div>
        <a class="download" id="download" href="#" hidden>
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 4v10m0 0 4-4m-4 4-4-4M5 20h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <span>Download MP4</span>
        </a>
      </article>
    </section>

    <div class="drop" id="drop" tabindex="0" role="button" aria-label="Choose video file">
      <div>Drop a video here or <strong>click to choose</strong></div>
      <div class="file-name" id="fileName"></div>
    </div>
    <input type="file" id="file" accept="video/mp4,video/quicktime,video/webm,video/x-matroska,.mp4,.mov,.webm,.m4v,.mkv" />

    <fieldset class="placement">
      <legend>Which PNG file</legend>
      <div class="opts">
        <label><input type="radio" name="placement" value="bottom" checked /> Bottom.png</label>
        <label><input type="radio" name="placement" value="top" /> Top.png</label>
      </div>
    </fieldset>

    <div class="row">
      <button type="button" id="process" disabled>Process video</button>
      <button type="button" class="btn-ghost" id="clear">Clear</button>
    </div>
    <p class="status" id="status"></p>
  </main>
  <script>
    function resolveApiBase() {
      const h = window.location.hostname;
      if (!/^(localhost|127\.0\.0\.1)$/.test(h)) {
        return 'https://YOUR-RAILWAY-APP.up.railway.app';
      }
      if (window.location.port === '8000') {
        return window.location.origin;
      }
      return `${window.location.protocol}//${h}:8000`;
    }
    const BACKEND_URL = resolveApiBase();

    const drop = document.getElementById('drop');
    const fileInput = document.getElementById('file');
    const fileNameEl = document.getElementById('fileName');
    const processBtn = document.getElementById('process');
    const clearBtn = document.getElementById('clear');
    const statusEl = document.getElementById('status');
    const downloadEl = document.getElementById('download');
    const beforeVideoEl = document.getElementById('beforeVideo');
    const afterVideoEl = document.getElementById('afterVideo');
    const beforePlaceholderEl = document.getElementById('beforePlaceholder');
    const afterPlaceholderEl = document.getElementById('afterPlaceholder');
    const beforeBoxEl = document.getElementById('beforeBox');
    const afterBoxEl = document.getElementById('afterBox');

    let selectedFile = null;
    let beforeObjectUrl = null;
    let lastObjectUrl = null;

    function placementValue() {
      const c = document.querySelector('input[name="placement"]:checked');
      return c ? c.value : 'bottom';
    }
    function outputFileName(inputName) {
      if (!inputName || typeof inputName !== 'string') return 'warning-text-output (1).mp4';
      const dot = inputName.lastIndexOf('.');
      const base = dot > 0 ? inputName.slice(0, dot) : inputName;
      return `${base} (1).mp4`;
    }

    function setStatus(msg, kind) {
      statusEl.textContent = msg || '';
      statusEl.className = 'status' + (kind ? ' ' + kind : '');
    }

    function revokeLastUrl() {
      if (lastObjectUrl) {
        URL.revokeObjectURL(lastObjectUrl);
        lastObjectUrl = null;
      }
    }
    function revokeBeforeUrl() {
      if (beforeObjectUrl) {
        URL.revokeObjectURL(beforeObjectUrl);
        beforeObjectUrl = null;
      }
    }

    function syncUi() {
      processBtn.disabled = !selectedFile;
      fileNameEl.textContent = selectedFile ? selectedFile.name : '';
    }
    function setBeforePreview(file) {
      revokeBeforeUrl();
      if (!file) {
        beforeVideoEl.hidden = true;
        beforeVideoEl.removeAttribute('src');
        beforePlaceholderEl.hidden = false;
        return;
      }
      beforeObjectUrl = URL.createObjectURL(file);
      beforeVideoEl.src = beforeObjectUrl;
      beforeVideoEl.hidden = false;
      beforePlaceholderEl.hidden = true;
      beforeBoxEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    function clearAfterPreview() {
      revokeLastUrl();
      afterVideoEl.pause();
      afterVideoEl.hidden = true;
      afterVideoEl.removeAttribute('src');
      afterPlaceholderEl.hidden = false;
      downloadEl.hidden = true;
    }

    drop.addEventListener('click', () => fileInput.click());
    drop.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
    });
    ['dragenter', 'dragover'].forEach((ev) => {
      drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add('drag'); });
    });
    ['dragleave', 'drop'].forEach((ev) => {
      drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove('drag'); });
    });
    drop.addEventListener('drop', (e) => {
      const f = e.dataTransfer.files[0];
      if (f) {
        selectedFile = f;
        clearAfterPreview();
        setBeforePreview(f);
        setStatus('');
        syncUi();
      }
    });
    fileInput.addEventListener('change', () => {
      const f = fileInput.files[0];
      selectedFile = f || null;
      clearAfterPreview();
      setBeforePreview(selectedFile);
      setStatus('');
      syncUi();
    });
    clearBtn.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      clearAfterPreview();
      setBeforePreview(null);
      setStatus('');
      syncUi();
    });

    fetch(`${BACKEND_URL}/api/health`)
      .then((r) => r.json())
      .then((d) => {
        if (d.status === 'ok') setStatus('Backend connected.', 'ok');
        else setStatus('Backend: unexpected response');
      })
      .catch(() =>
        setStatus(
          'Backend unreachable — run uvicorn on port 8000, then open http://localhost:8000 (not file://).',
          'err',
        ),
      );

    processBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      clearAfterPreview();
      processBtn.disabled = true;
      processBtn.textContent = 'Processing...';
      setStatus('Processing… this can take a while.');
      const fd = new FormData();
      fd.append('video', selectedFile);
      fd.append('placement', placementValue());
      try {
        const res = await fetch(`${BACKEND_URL}/api/process`, { method: 'POST', body: fd });
        if (!res.ok) {
          let detail = res.statusText;
          try {
            const j = await res.json();
            if (j.detail) detail = typeof j.detail === 'string' ? j.detail : JSON.stringify(j.detail);
          } catch (_) { /* ignore */ }
          throw new Error(detail);
        }
        const blob = await res.blob();
        lastObjectUrl = URL.createObjectURL(blob);
        downloadEl.href = lastObjectUrl;
        downloadEl.download = outputFileName(selectedFile && selectedFile.name);
        afterVideoEl.src = lastObjectUrl;
        afterVideoEl.hidden = false;
        afterPlaceholderEl.hidden = true;
        downloadEl.hidden = false;
        setStatus('Done. Download your file below.', 'ok');
        afterBoxEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } catch (e) {
        console.error('POST /api/process failed', e);
        let msg = e && e.message ? e.message : String(e);
        if (
          msg === 'Failed to fetch' ||
          msg === 'Load failed' ||
          (typeof msg === 'string' && msg.includes('NetworkError'))
        ) {
          msg =
            'Failed to fetch (browser blocked the request). Use http://localhost:8000 with uvicorn serving this page, or keep page + API on the same host/port. Check the terminal running uvicorn for errors.';
        }
        setStatus(msg, 'err');
      } finally {
        processBtn.textContent = 'Process video';
        syncUi();
      }
    });
    setBeforePreview(null);
    clearAfterPreview();
  </script>
</body>
</html>
